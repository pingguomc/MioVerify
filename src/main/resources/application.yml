server:
  # http端口，开启SSL时为https端口
  port: 8080
  # SSL证书设置
  ssl:
    # 是否启用SSL证书
    enabled: false
    # 当开启SSL时，访问http时的端口，之后会被重定向到http端口
    http-port: 8000
    # key-store证书位置
    key-store: keystore/default.keystore
    # 证书密码
    key-store-password: 123456
    # 证书类型
    key-store-type: jks
    # 证书别名
    key-alias: boot
  servlet:
    application-display-name: MioVerify Alpha
spring:
  servlet:
    multipart:
      # 允许文件上传
      enabled: true
      # 最大上传文件尺寸
      max-file-size: 800KB
      # 最大上传请求尺寸
      max-request-size: 2MB
  profiles:
    # 选择数据库，"test-sqlite" 或 "test-mysql"，这两个在下面配置
    active: test-sqlite
  data:
    # 设置Redis配置
    redis:
      # 默认用本地redis，如果要使用远程，请用url模式设置：
      # url: ...
      host: localhost
      port: 6379
mybatis-plus:
  global-config:
    banner: false
mioverify:

  # 跨域配置，生产环境中必须设置
  cors:
    # 是否启用跨域配置（若在 CDN 中配置或不跨域，可以不启用）
    enabled: false
    # 允许跨域的域名（* 表示允许所有，但生产环境不建议。）
    allowed-origin: "https://your-domain.com"

  # Oauth 配置项
  oauth:
    # 是否启用 Oauth 用户注册，注意不启用则无法注册用户，也不能使用 Oauth 登录
    enabled: true
    # OAuth 2 授权码状态有效期
    expire: 5m
    microsoft:
      enabled: false
      # 使用 issuer 自动发现所有端点，这是最推荐的方式
      issuer: "https://login.microsoftonline.com/common/v2.0"
      client-id: "自行填写客户端ID"
      client-secret: "自行填写客户端密钥"
      # 授权成功后的回调地址，GitHub 会将用户重定向至此 URI，并附带授权码。注意域名后的url路径后不能更改。
      redirect-uri: "http://localhost:8080/oauth/microsoft/callback"

      # OIDC 必须包含 openid，并请求基本信息和刷新令牌
      scope: "openid profile email offline_access"

    github:
      enabled: false
      # 以下三个内容需自行设置
      client-id: "你的GitHub客户端ID"
      client-secret: "你的GitHub客户端密钥"
      # 授权成功后的回调地址，GitHub 会将用户重定向至此 URI，并附带授权码。注意域名后的url路径后不能更改。
      redirect-uri: "http://localhost:8080/oauth/github/callback"
      # GitHub 的授权端点 URL
      authorization-url: "https://github.com/login/oauth/authorize"
      # GitHub 的访问令牌端点 URL
      token-url: "https://github.com/login/oauth/access_token"
      # GitHub 的用户信息 API 端点 URL
      user-info-url: "https://api.github.com/user"
      # 向 GitHub 请求的权限范围
      scope: "user:email"

    mcjpg:
      enabled: false
      # 使用 issuer URL，自动发现所有端点
      issuer: "https://auth.your-domain.com/realms/your-realm" # OIDC 地址
      client-id: "{OIDC_CLIENT_ID}"
      client-secret: "{OIDC_CLIENT_SECRET}"
      redirect-uri: "http://localhost:8080/oauth/mcjpg/callback" # 回调地址
      # 2. 请求 openid scope，并附带 profile 和 email
      scope: "openid profile email"

    custom:
      enabled: false
      # 以下所有内容需自行设置
      client-id: "客户端ID"
      client-secret: "客户端密钥"
      # 授权成功后的回调地址，会将用户重定向至此 URI，并附带授权码。注意域名后的url路径后不能更改。
      redirect-uri: "http://localhost:8080/oauth/custom/callback"
      # 授权端点 URL
      authorization-url: "https://your-auth-server.com/login/oauth/authorize"
      # 访问令牌端点 URL
      token-url: "https://your-auth-server.com/login/oauth/access_token"
      # 用户信息 API 端点 URL
      user-info-url: "https://your-auth-server.com/user"
      # 请求的权限范围
      scope: "user:email"

  # 扩展API配置项
  extern:
    register:
      # 开启注册API
      enabled: false
      # 允许注册用户(注册API开启时)
      allow-user: true
      # 允许注册角色(注册API开启时)
      allow-profile: false
      # 注册角色(Profile)时是否需要验证密码，推荐开启
      profile-strict: true
      # 使用注册和设置API时是否开启密钥
      # 必须要密钥正确才能操作
      permission-key:
        # 启用密钥验证
        enabled: false
        # 密钥
        key: admin123098
    # 是否允许重复角色名(仅发生在注册和修改)
    multi-profile-name: true
  token:
    # 给角色(Profile)签名的文本
    signature: 'abcd273nsi179a'
    # token暂时失效时间，期间可以被刷新
    expire: 10m
    # token永久过期时间
    invalid: 1h
  session:
    # session过期时间
    expire: 6m
  security:
    # 公钥路径
    public-key-loc: keys/public.pem
    # 对应私钥路径
    private-key-loc: keys/private.pem
    # 签名算法，推荐不更改
    sign-algorithm: SHA1withRSA
    # 批量获取角色(Profile)API最大限制数量
    profile-batch-limit: 5
  texture:
    # 材质存储位置
    storage-loc: textures
    # 默认皮肤存储位置
    default-skin-loc: textures/skin/default.png
  # 服务器元数据，详见Yggdrasil API
  props:
    meta:
      # 将会显示在启动器
      server-name: 'MioVerify 验证服务器'
      # 实现的名称
      implementation-name: mioverify
      # 实现的版本
      implementation-version: '${project.version}'
      links:
        # 主页地址
        home-page: https://www.baidu.com
        # 注册页地址
        register: https://www.baidu.com
    # 材质域名白名单，语法详见Yggdrasil API
    skin-domains:
      - 'baidu.com'
    # 决定返回角色(Profile)加上的材质url是否https开头
    # SSL请在相关配置单独设置
    use-https: false
    # 服务器域名，将会拼接在角色材质url中
    server-domain: localhost
---
# 使用MySQL时的配置
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 数据库地址
    url: jdbc:mysql://localhost:3306/数据库名
    # 用户名
    username: root
    # 密码
    password: password
  config:
    activate:
      on-profile: test-mysql
---
# 使用SQLite时的配置
spring:
  datasource:
    driver-class-name: org.sqlite.JDBC
    # 数据库地址
    url: jdbc:sqlite:data.db
  config:
    activate:
      on-profile: test-sqlite